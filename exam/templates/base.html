<!DOCTYPE html>
<html lang="en">
<head>
    <title>Online Exam</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    :root {
        --primary: #6366f1;
        --secondary: #9333ea;
        --dark-bg: #0f172a;
        --light-bg: #f8fafc;
        --glass: rgba(255,255,255,0.15);
    }

    body {
        font-family: 'Poppins', sans-serif;
        background: var(--light-bg);
        transition: 0.4s ease;
        overflow-x: hidden;
    }

    body.dark-mode {
        background: var(--dark-bg);
        color: white;
    }

    /* Animated Background */
    .bg-shape {
        position: fixed;
        width: 400px;
        height: 400px;
        background: linear-gradient(45deg, #6366f1, #9333ea);
        border-radius: 50%;
        filter: blur(140px);
        opacity: 0.35;
        z-index: -1;
        animation: float 10s infinite alternate ease-in-out;
    }

    .bg-shape2 {
        bottom: -150px;
        right: -150px;
        animation-delay: 3s;
    }

    @keyframes float {
        from { transform: translateY(0px); }
        to { transform: translateY(-60px); }
    }

    /* Navbar */
    .custom-navbar {
        background: linear-gradient(270deg, #1e3a8a, #4f46e5, #9333ea);
        background-size: 400% 400%;
        animation: gradientMove 8s ease infinite;
        backdrop-filter: blur(15px);
        box-shadow: 0 5px 25px rgba(0,0,0,0.3);
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .navbar-brand {
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 1px;
    }

    /* Profile Image */
    .profile-img {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid white;
        transition: 0.3s;
        cursor: pointer;
    }

    .profile-img:hover {
        transform: scale(1.15);
        box-shadow: 0 0 15px rgba(255,255,255,0.8);
    }

    /* Glass Card */
    .content-wrapper {
        background: rgba(255,255,255,0.75);
        backdrop-filter: blur(15px);
        padding: 50px;
        border-radius: 25px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        transition: 0.4s;
        animation: fadeUp 0.8s ease;
    }

    body.dark-mode .content-wrapper {
        background: rgba(255,255,255,0.05);
        box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    }

    @keyframes fadeUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Dark Mode Toggle */
    .mode-toggle {
        cursor: pointer;
        font-size: 22px;
        color: white;
        margin-right: 20px;
        transition: 0.3s;
    }

    .mode-toggle:hover {
        transform: rotate(20deg) scale(1.2);
    }

    /* Stylish Button */
    .btn-light {
        background: white;
        border: none;
        font-weight: 500;
        transition: 0.3s;
    }

    .btn-light:hover {
        background: var(--secondary);
        color: white;
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    /* Dropdown */
    .dropdown-menu {
        border-radius: 15px;
        padding: 10px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        border: none;
    }

    .dropdown-item:hover {
        background: linear-gradient(90deg, #6366f1, #9333ea);
        color: white;
        border-radius: 10px;
    }

</style>
</head>
<body>

<div class="bg-shape"></div>
<div class="bg-shape bg-shape2"></div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark custom-navbar px-4">

    <a class="navbar-brand" href="{% url 'index' %}">
        🎓 Online Exam
    </a>

    <div class="ms-auto d-flex align-items-center">

        {% if request.user.is_authenticated %}

            <!-- Dark Mode Toggle -->
            <div class="mode-toggle" onclick="toggleMode()">🌙</div>


            <!-- Profile Dropdown -->
            <div class="dropdown">
                <img src="{% if request.user.student.profile_image %}{{ request.user.student.profile_image.url }}{% else %}https://cdn-icons-png.flaticon.com/512/149/149071.png{% endif %}"
                     class="profile-img dropdown-toggle"
                     data-bs-toggle="dropdown">

                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="{% url 'profile' %}">Profile</a></li>
                    
                </ul>
            </div>

        {% else %}

            <a href="{% url 'login' %}" class="btn btn-light rounded-pill px-4">
                Login
            </a>

        {% endif %}

    </div>

</nav>

<!-- MAIN CONTENT -->
<div class="container mt-5">
    <div class="content-wrapper">
        {% block content %}
        {% endblock %}
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function toggleMode() {
        document.body.classList.toggle("dark-mode");

        const toggle = document.querySelector(".mode-toggle");

        if (document.body.classList.contains("dark-mode")) {
            toggle.textContent = "☀️";
        } else {
            toggle.textContent = "🌙";
        }
    }
</script>

</body>
</html>
