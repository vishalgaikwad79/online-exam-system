{% extends 'base.html' %}

{% block content %}

<style>
    body {
        background: linear-gradient(120deg, #89f7fe, #66a6ff);
    }

    .card {
        width: 380px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        overflow: hidden;
        text-align: center;
        margin: 80px auto;
    }

    .card-header {
        background: #4f46e5;
        padding: 25px;
        color: white;
    }

    .card-header h2 {
        font-size: 22px;
        letter-spacing: 1px;
    }

    .card-body {
        padding: 30px;
        display: flex;
        flex-direction: column;
        gap: 18px;
    }

    .card-body a {
        text-decoration: none;
        padding: 14px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: bold;
        transition: 0.3s ease;
        color: white;
    }

    .btn-subject {
        background: #4f46e5;
    }

    .btn-subject:hover {
        background: #3730a3;
        transform: translateY(-2px);
    }

    .btn-logout {
        background: #ef4444;
    }

    .btn-logout:hover {
        background: #b91c1c;
        transform: translateY(-2px);
    }
</style>

<div class="card">
    <div class="card-header">
        <h2>Welcome to Online Exam System</h2>
    </div>

    <div class="card-body">
        <a href="{% url 'subjects' %}" class="btn-subject">View Subjects</a>
        <a href="{% url 'logout' %}" class="btn-logout">Logout</a>
    </div>
</div>

{% endblock %}
