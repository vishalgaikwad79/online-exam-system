<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .otp-card {
            width: 100%;
            max-width: 420px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .otp-title {
            font-weight: 600;
            color: #4e73df;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            font-size: 16px;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #4e73df;
            box-shadow: 0 0 8px rgba(78, 115, 223, 0.3);
        }

        .btn-verify {
            background: #4e73df;
            border: none;
            padding: 12px;
            font-weight: 500;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-verify:hover {
            background: #2e59d9;
            transform: translateY(-2px);
        }

        .timer-box {
            font-weight: 500;
            margin-bottom: 15px;
        }

        .timer-count {
            font-weight: bold;
            color: #e74a3b;
        }

        .resend-link {
            text-decoration: none;
            font-weight: 500;
            color: #1cc88a;
        }

        .resend-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="otp-card text-center">
    <h4 class="otp-title mb-3">🔐 Verify Your OTP</h4>

    {% if error %}
    <div class="alert alert-danger">
        {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div class="alert alert-success">
        {{ success }}
    </div>
    {% endif %}

    <div class="timer-box">
        OTP expires in <span id="timer" class="timer-count">60</span> seconds
    </div>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="otp"
               class="form-control mb-3 text-center"
               placeholder="Enter 6-digit OTP"
               maxlength="6"
               required>

        <button class="btn btn-verify w-100">
            Verify OTP
        </button>
    </form>

    <div class="mt-3">
        <a href="{% url 'resend_otp' %}" class="resend-link">
            Resend OTP
        </a>
    </div>
</div>

<script>
let timeLeft = 60;
let timer = document.getElementById("timer");

let countdown = setInterval(function(){
    timeLeft--;
    timer.innerText = timeLeft;

    if(timeLeft <= 0){
        clearInterval(countdown);
        timer.innerText = "Expired";
        alert("OTP Expired! Please register again.");
        window.location.href = "/register/";
    }
}, 1000);
</script>

</body>
</html>
